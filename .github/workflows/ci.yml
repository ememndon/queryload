name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Windows-only: QueryLoad targets Windows (DPAPI key sealing via PowerShell),
# and the engine's native modules are ABI-specific, so the gates must run on the
# real target OS.
jobs:
  verify:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    name: verify (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (exact, from lockfile)
        run: npm ci

      # Runs build + typecheck + lint + runtime-network audit + all eight phase
      # acceptance smokes + the D79 UI layout regression. This is the same
      # command developers run locally; CI makes it non-optional.
      - name: Verify all
        run: npm run verify:all

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Generate SBOM
        run: npm run sbom
